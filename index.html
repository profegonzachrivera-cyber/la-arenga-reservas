<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Arenga - Reservas</title>

<style>
body{margin:0;font-family:Arial;background:#0f3d2e;color:white}
header{padding:15px;text-align:center;font-size:20px;font-weight:bold}
.container{padding:10px}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none}
.slot{padding:15px;margin-bottom:8px;border-radius:10px;display:flex;justify-content:space-between}
.free{background:#1f7a5c}
.booked{background:#b23a3a}
button{padding:10px;border:none;border-radius:8px;margin-top:5px;width:100%}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center}
.modal-content{background:#111;padding:20px;border-radius:10px;width:90%}
</style>
</head>

<body>

<header>⚽ La Arenga</header>

<div class="container">
<input type="date" id="date">
<div id="slots"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>
<input id="name" placeholder="Nombre">
<input id="phone" placeholder="Teléfono">
<button onclick="save()">Guardar</button>
<button onclick="del()">Eliminar</button>
<button onclick="closeM()">Cancelar</button>
</div>
</div>

<script>
const hours=["09:00","10:00","11:00","12:00","18:00","19:00","20:00"]
let sel=null

const d=document.getElementById("date")
const s=document.getElementById("slots")

function key(){return "res_"+d.value}

function load(){
s.innerHTML=""
const data=JSON.parse(localStorage.getItem(key())||"{}")

hours.forEach(h=>{
const div=document.createElement("div")
div.className="slot "+(data[h]?"booked":"free")
div.innerHTML=`<span>${h}</span><span>${data[h]?data[h].name:"Libre"}</span>`
div.onclick=()=>open(h,data[h])
s.appendChild(div)
})
}

function open(h,r){
sel=h
modal.style.display="flex"
title.innerText="Hora "+h
name.value=r?.name||""
phone.value=r?.phone||""
}

function closeM(){modal.style.display="none"}

function save(){
const data=JSON.parse(localStorage.getItem(key())||"{}")
data[sel]={name:name.value,phone:phone.value}
localStorage.setItem(key(),JSON.stringify(data))
closeM()
load()
}

function del(){
const data=JSON.parse(localStorage.getItem(key())||"{}")
delete data[sel]
localStorage.setItem(key(),JSON.stringify(data))
closeM()
load()
}

d.value=new Date().toISOString().split("T")[0]
d.onchange=load

load()
</script>

</body>
</html>
