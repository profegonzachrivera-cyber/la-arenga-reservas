<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Arenga - Reservas Pro</title>

<style>
:root{
--bg:#0f3d2e;
--card:#173f33;
--free:#1f8f5f;
--booked:#d64541;
--accent:#ff7a00;
}

body{margin:0;font-family:system-ui;background:var(--bg);color:white}
header{padding:15px;text-align:center;font-size:20px;background:#0b2a20}
.container{padding:12px;max-width:900px;margin:auto}

.login{display:flex;flex-direction:column;gap:10px;margin-top:40px}
button{padding:12px;border:none;border-radius:10px;font-size:16px}
.admin{background:var(--accent)}
.client{background:#333;color:white}

.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:15px 0}
.day{background:var(--card);padding:10px;border-radius:10px;text-align:center;cursor:pointer}
.day.active{background:var(--accent)}

.slot{display:flex;justify-content:space-between;padding:14px;border-radius:10px;margin-bottom:8px}
.free{background:var(--free)}
.booked{background:var(--booked)}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center}
.modal-content{background:#111;padding:20px;border-radius:10px;width:90%}

input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none}
</style>
</head>

<body>
<header>⚽ La Arenga</header>

<div class="container" id="login">
<h2>Seleccionar modo</h2>
<div class="login">
<button class="admin" onclick="enter('admin')">Administrador</button>
<button class="client" onclick="enter('client')">Cliente</button>
</div>
</div>

<div class="container" id="app" style="display:none">
<div id="week" class="week"></div>
<div id="slots"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>
<input id="name" placeholder="Nombre" />
<input id="phone" placeholder="Teléfono" />
<button onclick="save()">Guardar</button>
<button onclick="closeM()">Cerrar</button>
</div>
</div>

<script>

const hours=["15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"]
let mode="client"
let selectedDate=null
let selectedHour=null

function enter(m){
mode=m
login.style.display="none"
app.style.display="block"
generateWeek()
load()
}

function key(){return "arenga_"+selectedDate}

function generateWeek(){
week.innerHTML=""
const today=new Date()

for(let i=0;i<7;i++){
const d=new Date()
d.setDate(today.getDate()+i)
const iso=d.toISOString().split("T")[0]

const div=document.createElement("div")
div.className="day"

div.innerHTML=d.toLocaleDateString("es-CL",{weekday:"short",day:"numeric"})

if(i===0){selectedDate=iso;div.classList.add("active")}


div.onclick=()=>{
selectedDate=iso
Array.from(document.querySelectorAll(".day")).forEach(e=>e.classList.remove("active"))
div.classList.add("active")
load()
}

week.appendChild(div)
}
}

function load(){
slots.innerHTML=""
const data=JSON.parse(localStorage.getItem(key())||"{}")

hours.forEach(h=>{
const res=data[h]
const div=document.createElement("div")
div.className="slot "+(res?"booked":"free")

div.innerHTML=`<span>${h}</span><span>${res?res.name:"Disponible"}</span>`

if(mode==='admin' || !res){
div.onclick=()=>open(h,res)
}

slots.appendChild(div)
})
}

function open(h,r){
selectedHour=h
modal.style.display="flex"
title.innerText="Hora "+h
name.value=r?.name||""
phone.value=r?.phone||""
}

function closeM(){modal.style.display="none"}

function save(){
const data=JSON.parse(localStorage.getItem(key())||"{}")
data[selectedHour]={name:name.value,phone:phone.value}
localStorage.setItem(key(),JSON.stringify(data))
closeM();load()
}

</script>

</body>
</html>
