<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Arenga</title>

<style>
:root{
--verde:#1f8f5f;
--rojo:#d64541;
--naranja:#ff7a00;
}

body{
margin:0;
font-family:system-ui;
background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2') no-repeat center center fixed;
background-size: cover;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* HOME */
.home{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.logo{
height:90px;
margin-bottom:20px;
}

.cta{
background:var(--naranja);
padding:18px 25px;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.cta:hover{
transform:scale(1.05);
}

/* APP */
.container{
max-width:500px;
margin:auto;
padding:15px;
display:none;
}

/* HORAS */
.slot{
display:flex;
justify-content:space-between;
padding:16px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.slot:hover{
transform:scale(1.03);
}

.free{
background:linear-gradient(45deg,#1f8f5f,#28a36a);
}

.booked{
background:linear-gradient(45deg,#d64541,#ff5c5c);
}

/* BOTONES */
button{
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
width:100%;
font-size:16px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:none;
}

/* ADMIN BOTON */
#adminBtn{
position:fixed;
bottom:15px;
left:15px;
width:55px;
height:55px;
border-radius:50%;
background:#ff7a00;
color:white;
font-size:20px;
border:none;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* VOLVER */
.back{
background:#444;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="home" id="home">
<img src="logo.png" class="logo">
<h1>Complejo Deportivo</h1>
<h2>La Arenga</h2>

<div class="cta" onclick="enterClient()">
⚽ Arrienda tu hora aquí
</div>
</div>

<!-- APP -->
<div class="container" id="app">

<button class="back" onclick="volverInicio()">⬅ Volver</button>

<h3>Selecciona día</h3>
<input type="date" id="calendar">

<div id="slots"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>

<input id="nombre" placeholder="Nombre">
<input id="phone" placeholder="Teléfono">

<button onclick="save()">Guardar</button>
<button onclick="removeReservation()">Eliminar</button>
<button onclick="closeM()">Cerrar</button>

</div>
</div>

<!-- ADMIN -->
<button id="adminBtn" onclick="adminLogin()">⚙</button>

<script>

const ADMIN_PASSWORD="1234"

const hours=[
"15:00","16:00","17:00","18:00",
"19:00","20:00","21:00","22:00","23:00"
]

let mode="client"
let selectedDate=null
let selectedHour=null

function adminLogin(){
const pass=prompt("Contraseña")
if(pass===ADMIN_PASSWORD){
mode="admin"
start()
}else{
alert("Incorrecta")
}
}

function enterClient(){
mode="client"
start()
}

function volverInicio(){
app.style.display="none"
home.style.display="flex"
}

function start(){
home.style.display="none"
app.style.display="block"

const today=new Date().toISOString().split("T")[0]
calendar.value=today
selectedDate=today

calendar.onchange=()=>{
selectedDate=calendar.value
load()
}

load()
}

function key(){
return "arenga_"+selectedDate
}

function load(){
slots.innerHTML=""

const data=JSON.parse(localStorage.getItem(key())||"{}")

hours.forEach(h=>{

const res=data[h]

const div=document.createElement("div")
div.className="slot "+(res?"booked":"free")

div.innerHTML=`
<span>${h}</span>
<span>${res?res.name:"Disponible"}</span>
`

if(mode==="admin" || !res){
div.onclick=()=>open(h,res)
}

slots.appendChild(div)

})
}

function open(h,r){
selectedHour=h
modal.style.display="flex"
title.innerText="Reserva "+h

document.getElementById("nombre").value = r?.name || ""
document.getElementById("phone").value = r?.phone || ""
}

function closeM(){
modal.style.display="none"
}

function save(){

const nombre = document.getElementById("nombre").value.trim()

if(!nombre){
alert("Ingrese nombre")
return
}

const data=JSON.parse(localStorage.getItem(key())||"{}")

data[selectedHour]={
name:nombre,
phone:document.getElementById("phone").value
}

localStorage.setItem(key(),JSON.stringify(data))

closeM()
load()
}

function removeReservation(){

const data=JSON.parse(localStorage.getItem(key())||"{}")

delete data[selectedHour]

localStorage.setItem(key(),JSON.stringify(data))

closeM()
load()

}

</script>

</body>
</html>
