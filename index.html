<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Arenga - Sistema Pro</title>

<style>
:root{
--bg:#0f3d2e;
--card:#173f33;
--free:#1f8f5f;
--booked:#d64541;
--accent:#ff7a00;
--panel:#0b2a20;
}

body{margin:0;font-family:system-ui;background:var(--bg);color:white}
header{padding:15px;text-align:center;background:var(--panel);font-size:20px}

.container{display:flex;gap:20px;padding:12px;max-width:1100px;margin:auto}

.sidebar{width:260px;background:var(--panel);padding:15px;border-radius:12px}

.main{flex:1}

.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}

.day{background:var(--card);padding:10px;border-radius:10px;text-align:center;cursor:pointer}
.day.active{background:var(--accent)}

.slot{display:flex;justify-content:space-between;padding:14px;border-radius:10px;margin-bottom:8px;cursor:pointer}

.free{background:var(--free)}
.booked{background:var(--booked)}

.login{max-width:400px;margin:80px auto;text-align:center}

button{padding:12px;border:none;border-radius:10px;font-size:16px;width:100%;margin-top:8px}
.admin{background:var(--accent)}
.client{background:#333;color:white}

input{width:100%;padding:10px;margin-top:8px;margin-bottom:10px;border-radius:8px;border:none}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center}
.modal-content{background:#111;padding:20px;border-radius:12px;width:90%;max-width:400px}

</style>
</head>

<body>

<header>⚽ Complejo Deportivo La Arenga</header>

<div id="login" class="login">
<h2>Ingreso al sistema</h2>
<button class="admin" onclick="adminLogin()">Administrador</button>
<button class="client" onclick="enterClient()">Cliente</button>
</div>

<div id="app" style="display:none" class="container">

<div class="sidebar">
<h3>Calendario</h3>
<input type="date" id="calendar" />
<p style="font-size:12px;opacity:.7">Selecciona cualquier día del mes</p>
</div>

<div class="main">
<div id="week" class="week"></div>
<div id="slots"></div>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>
<input id="name" placeholder="Nombre" />
<input id="phone" placeholder="Teléfono" />
<button onclick="save()">Guardar / Modificar</button>
<button onclick="removeReservation()">Eliminar Reserva</button>
<button onclick="closeM()">Cerrar</button>
</div>
</div>

<script>

const ADMIN_PASSWORD="1234"  // puedes cambiarla

const hours=["15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"]

let mode="client"
let selectedDate=null
let selectedHour=null

function adminLogin(){
const pass=prompt("Ingrese contraseña de administrador")
if(pass===ADMIN_PASSWORD){
mode="admin"
startApp()
}else{
alert("Contraseña incorrecta")
}
}

function enterClient(){
mode="client"
startApp()
}

function startApp(){
login.style.display="none"
app.style.display="flex"

const today=new Date().toISOString().split("T")[0]
calendar.value=today
selectedDate=today

calendar.onchange=()=>{
selectedDate=calendar.value
load()
}

generateWeek()
load()
}

function key(){return "arenga_"+selectedDate}

function generateWeek(){
week.innerHTML=""

const base=new Date(calendar.value)

for(let i=0;i<7;i++){

const d=new Date(base)
d.setDate(base.getDate()+i)

const iso=d.toISOString().split("T")[0]

const div=document.createElement("div")

div.className="day"

div.innerHTML=d.toLocaleDateString("es-CL",{weekday:"short",day:"numeric"})

if(i===0){div.classList.add("active")}


div.onclick=()=>{
selectedDate=iso
Array.from(document.querySelectorAll(".day")).forEach(e=>e.classList.remove("active"))
div.classList.add("active")
load()
}

week.appendChild(div)
}
}

function load(){
slots.innerHTML=""

const data=JSON.parse(localStorage.getItem(key())||"{}")

hours.forEach(h=>{

const res=data[h]

const div=document.createElement("div")

div.className="slot "+(res?"booked":"free")

div.innerHTML=`<span>${h}</span><span>${res?res.name:"Disponible"}</span>`

if(mode==='admin' || !res){
div.onclick=()=>open(h,res)
}

slots.appendChild(div)

})
}

function open(h,r){
selectedHour=h
modal.style.display="flex"
title.innerText="Reserva " + h
name.value=r?.name||""
phone.value=r?.phone||""
}

function closeM(){modal.style.display="none"}

function save(){

if(!name.value){
alert("Ingrese nombre")
return
}

const data=JSON.parse(localStorage.getItem(key())||"{}")

data[selectedHour]={
name:name.value,
phone:phone.value
}

localStorage.setItem(key(),JSON.stringify(data))

closeM()
load()

}

function removeReservation(){

const data=JSON.parse(localStorage.getItem(key())||"{}")

if(data[selectedHour]) delete data[selectedHour]

localStorage.setItem(key(),JSON.stringify(data))

closeM()
load()

}

</script>

</body>
</html>
