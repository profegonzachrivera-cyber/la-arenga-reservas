<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Arenga - Reservas</title>

<style>
:root{
--bg:#0f3d2e;
--card:#173f33;
--free:#1f7a5c;
--booked:#c0392b;
--accent:#ff7a00;
}

body{
margin:0;
font-family:system-ui,Arial;
background:var(--bg);
color:white;
}

header{
padding:16px;
text-align:center;
font-size:22px;
font-weight:700;
}

.container{
padding:12px;
max-width:700px;
margin:auto;
}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-bottom:16px;
}

.day{
background:var(--card);
padding:8px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-size:13px;
}

.day.active{
background:var(--accent);
}

.slots{
margin-top:10px;
}

.slot{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
border-radius:12px;
margin-bottom:10px;
font-size:18px;
cursor:pointer;
}

.free{background:var(--free)}
.booked{background:var(--booked)}

.name{
font-size:14px;
opacity:.9;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
padding:12px;
}

.modal-content{
background:#111;
padding:20px;
border-radius:14px;
width:100%;
max-width:420px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:8px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:6px;
font-size:15px;
}

.primary{background:var(--accent);color:white}
.secondary{background:#333;color:white}
.danger{background:#222;color:white}

.footer{
text-align:center;
font-size:12px;
margin-top:20px;
opacity:.6;
}
</style>
</head>

<body>

<header>⚽ La Arenga - Reservas</header>

<div class="container">

<div id="week" class="week"></div>

<div id="slots" class="slots"></div>

<div class="footer">Gestor semanal de reservas</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<h3 id="modalTitle"></h3>

<input id="name" placeholder="Nombre del cliente" />
<input id="phone" placeholder="Teléfono" />

<button class="primary" onclick="saveReservation()">Guardar Reserva</button>
<button class="danger" onclick="deleteReservation()">Eliminar</button>
<button class="secondary" onclick="closeModal()">Cancelar</button>

</div>
</div>

<script>

const hours=["15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"]

let selectedDate=null
let selectedHour=null

const weekDiv=document.getElementById("week")
const slotsDiv=document.getElementById("slots")

function getKey(){
return "arenga_"+selectedDate
}

function generateWeek(){
weekDiv.innerHTML=""

const today=new Date()

for(let i=0;i<7;i++){

const d=new Date()
d.setDate(today.getDate()+i)

const iso=d.toISOString().split("T")[0]

const div=document.createElement("div")

div.className="day"

const name=d.toLocaleDateString("es-CL",{weekday:"short"})
const day=d.getDate()


div.innerHTML=`${name}<br>${day}`

if(i===0){
selectedDate=iso
div.classList.add("active")
}


div.onclick=()=>{

selectedDate=iso

Array.from(document.querySelectorAll(".day")).forEach(el=>el.classList.remove("active"))


div.classList.add("active")

loadSlots()

}

weekDiv.appendChild(div)

}

}

function loadSlots(){

slotsDiv.innerHTML=""

const data=JSON.parse(localStorage.getItem(getKey())||"{}")

hours.forEach(h=>{

const res=data[h]

const div=document.createElement("div")


div.className="slot "+(res?"booked":"free")


div.innerHTML=`
<div>
<strong>${h}</strong>
<div class="name">${res?res.name:"Disponible"}</div>
</div>
<div>➜</div>
`


div.onclick=()=>openModal(h,res)

slotsDiv.appendChild(div)

})

}

function openModal(hour,res){
selectedHour=hour
modal.style.display="flex"
modalTitle.innerText="Reserva " + hour
name.value=res?.name||""
phone.value=res?.phone||""
}

function closeModal(){
modal.style.display="none"
}

function saveReservation(){

if(!name.value){
alert("Ingrese nombre")
return
}

const data=JSON.parse(localStorage.getItem(getKey())||"{}")


data[selectedHour]={
name:name.value,
phone:phone.value
}

localStorage.setItem(getKey(),JSON.stringify(data))

closeModal()
loadSlots()

}

function deleteReservation(){

const data=JSON.parse(localStorage.getItem(getKey())||"{}")

if(data[selectedHour]) delete data[selectedHour]

localStorage.setItem(getKey(),JSON.stringify(data))

closeModal()
loadSlots()

}


generateWeek()
loadSlots()

</script>

</body>
</html>
