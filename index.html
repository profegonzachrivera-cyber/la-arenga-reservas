<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Arenga</title>

<style>
:root{
--verde:#1f8f5f;
--rojo:#d64541;
--naranja:#ff7a00;
}

body{
margin:0;
font-family:system-ui;
background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2') no-repeat center center fixed;
background-size: cover;
color:white;
}

/* capa oscura */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* header */
header{
text-align:center;
padding:15px;
}

header img{
height:80px;
}

/* contenedor */
.container{
max-width:500px;
margin:auto;
padding:15px;
}

/* tarjetas horarios */
.slot{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.slot:hover{
transform:scale(1.02);
}

.free{
background:linear-gradient(45deg,#1f8f5f,#28a36a);
}

.booked{
background:linear-gradient(45deg,#d64541,#ff5c5c);
}

/* botones */
button{
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
width:100%;
font-size:16px;
font-weight:bold;
}

.btn-admin{background:var(--naranja);color:white;}
.btn-client{background:#333;color:white;}
.btn-back{background:#555;}

/* modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:none;
}

/* fecha */
input[type="date"]{
background:white;
color:black;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
</header>

<!-- LOGIN -->
<div id="login" class="container">
<h2>Ingreso</h2>
<button class="btn-admin" onclick="adminLogin()">Administrador</button>
<button class="btn-client" onclick="enterClient()">Cliente</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none">

<button class="btn-back" onclick="volverInicio()">⬅ Volver</button>

<h3>Selecciona día</h3>
<input type="date" id="calendar">

<div id="slots"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>
<input id="name" placeholder="Nombre">
<input id="phone" placeholder="Teléfono">
<button class="btn-admin" onclick="save()">Guardar</button>
<button onclick="removeReservation()">Eliminar</button>
<button onclick="closeM()">Cerrar</button>
</div>
</div>

<script>

const ADMIN_PASSWORD="1234"

const hours=[
"15:00","16:00","17:00","18:00",
"19:00","20:00","21:00","22:00","23:00"
]

let mode="client"
let selectedDate=null
let selectedHour=null

function adminLogin(){
const pass=prompt("Contraseña")
if(pass===ADMIN_PASSWORD){
mode="admin"
start()
}else{
alert("Contraseña incorrecta")
}
}

function enterClient(){
mode="client"
start()
}

function volverInicio(){
app.style.display="none"
login.style.display="block"
}

function start(){
login.style.display="none"
app.style.display="block"

const today=new Date().toISOString().split("T")[0]
calendar.value=today
selectedDate=today

calendar.onchange=()=>{
selectedDate=calendar.value
load()
}

load()
}

function key(){
return "arenga_"+selectedDate
}

function load(){
slots.innerHTML=""

const data=JSON.parse(localStorage.getItem(key())||"{}")

hours.forEach(h=>{

const res=data[h]

const div=document.createElement("div")
div.className="slot "+(res?"booked":"free")

div.innerHTML=`
<span>${h}</span>
<span>${res?res.name:"Disponible"}</span>
`

if(mode==="admin" || !res){
div.onclick=()=>open(h,res)
}

slots.appendChild(div)

})
}

function open(h,r){
selectedHour=h
modal.style.display="flex"
title.innerText="Reserva "+h
name.value=r?.name||""
phone.value=r?.phone||""
}

function closeM(){
modal.style.display="none"
}

function save(){

if(!name.value){
alert("Ingrese nombre")
return
}

const data=JSON.parse(localStorage.getItem(key())||"{}")

data[selectedHour]={
name:name.value,
phone:phone.value
}

localStorage.setItem(key(),JSON.stringify(data))

closeM()
load()
}

function removeReservation(){

const data=JSON.parse(localStorage.getItem(key())||"{}")

delete data[selectedHour]

localStorage.setItem(key(),JSON.stringify(data))

closeM()
load()

}

</script>

</body>
</html>
